name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "DATABASE_URL=postgresql://postgres:password@db:5432/taskmanager" >> .env
          echo "SECRET_KEY=clave_secreta_para_ci_no_importa_cual" >> .env
          echo "ALGORITHM=HS256" >> .env
          echo "ACCESS_TOKEN_EXPIRE_MINUTES=30" >> .env

      - name: Build containers
        run: docker compose build

      - name: Start database
        run: |
          docker compose up -d db
          sleep 10

      - name: Start API
        run: |
          docker compose up -d api
          sleep 5

      - name: Run tests
        run: docker compose exec -T api pytest tests/ -v

      - name: Teardown
        run: docker compose d